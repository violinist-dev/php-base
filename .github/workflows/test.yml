name: Test
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version:
          - "7.3"
          - "7.4"
          - "8.0"
          - "8.1"
          - "8.2"
          - "8.3"
          - "8.4"
          - "8.5"
          - "8.6"
    steps:
      - name: Dump matrix context
        env:
          MATRIX_CONTEXT: ${{ toJSON(matrix) }}
        run: echo "$MATRIX_CONTEXT"

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Build test image
        if: matrix.php-version != '8.6'
        run: docker build -t php-base --build-arg PHP_VERSION=$PHP_VERSION .
        env:
          PHP_VERSION: ${{ matrix.php-version }}

      - name: Build test image
        if: matrix.php-version == '8.6'
        run: docker build -t php-base --build-arg PHP_VERSION=$PHP_VERSION .
        env:
          PHP_VERSION: '8.6.0alpha2'

      - name: Pull main image for size comparison
        id: pull_main
        continue-on-error: true
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.php-version }}-multi

      - name: Output image size from main
        if: steps.pull_main.outcome == 'success'
        id: main_size
        run: |
          size=$(docker image inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.php-version }}-multi --format='{{ .Size }}')
          echo "Main image size: $(numfmt --to=iec --suffix=B "$size")"
          echo "size=$size" >> "$GITHUB_OUTPUT"

      - name: Output image size for build
        id: build_size
        run: |
          size=$(docker image inspect php-base --format='{{ .Size }}')
          echo "Build image size: $(numfmt --to=iec --suffix=B "$size")"
          echo "size=$size" >> "$GITHUB_OUTPUT"

      - name: Output image size diff
        if: steps.pull_main.outcome == 'success'
        run: |
          main_size=${{ steps.main_size.outputs.size }}
          build_size=${{ steps.build_size.outputs.size }}
          diff=$((build_size - main_size))
          if [ "$diff" -gt 0 ]; then
            sign="+"
          else
            sign=""
          fi
          echo "Image size diff (build vs main): ${sign}$(numfmt --to=iec --suffix=B -- "$diff")"

      - name: Output modules
        run: docker run php-base php -m

      - name: Check for PHP warnings or notices
        run: |
          num=$(docker run php-base php -r "print null;" | awk 'END {print NR}')
          # if this prints a line or 2 that can be warnings and what not. don't want those.
          if [ $num != "0" ]
          then
            exit 1
          fi

      - name: Print composer version
        run: composer --version

      - name: Check requirements
        if: matrix.php-version != '8.5' && matrix.php-version != '8.6'
        run: docker run -w "/test" -v $(pwd):/test php-base composer install
